<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Dashboard{% endblock %} — Mister Wiz</title>
<style>
:root {
  --purple: #5B2D8E;
  --purple-dk: #4A1F7C;
  --purple-lt: #F5EEF8;
  --border: #E2E2E2;
  --text: #111;
  --gray: #666;
  --white: #fff;
  --radius: 10px;
  --font: Arial, Helvetica, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: #F4F2F8; color: var(--text); min-height: 100vh; display: flex; }

/* ── Sidebar ── */
.sidebar {
  width: 220px; min-height: 100vh;
  background: var(--purple-dk);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
}
.brand {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
  margin-bottom: 6px;
}
.brand-mister { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.55); letter-spacing: 2.5px; }
.brand-wiz { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -1px; line-height: 1; }
.brand-wiz .star { color: #C89EFF; }
.brand-sub { font-size: 8.5px; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; margin-top: 3px; text-transform: uppercase; }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 20px; color: rgba(255,255,255,0.65);
  text-decoration: none; font-size: 13px; font-weight: 600;
  transition: background 0.12s, color 0.12s;
}
.nav-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-link.active { background: rgba(255,255,255,0.16); color: #fff; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-spacer { flex: 1; }
.nav-logout {
  border-top: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4); font-size: 12px;
}
.nav-logout:hover { color: #FF9999; background: rgba(255,0,0,0.08); }

/* ── Main ── */
.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 5;
}
.page-title { font-size: 17px; font-weight: 900; }
.content { padding: 24px 28px; flex: 1; }

/* ── Cards ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
}
.stat-label { font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.stat-value { font-size: 38px; font-weight: 900; color: var(--purple); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--gray); margin-top: 4px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: none; text-decoration: none;
  transition: opacity 0.12s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--purple); color: var(--white); }
.btn-outline { background: transparent; color: var(--purple); border: 2px solid var(--purple); }
.btn-danger { background: #C0392B; color: var(--white); }
.btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--purple); color: var(--purple); opacity: 1; }
.btn-sm { padding: 5px 11px; font-size: 11px; border-radius: 5px; }
.btn-xs { padding: 3px 8px; font-size: 10px; border-radius: 4px; }

/* ── Table ── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: var(--purple); color: var(--white);
  padding: 10px 13px; text-align: left;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
td { padding: 9px 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--purple-lt); }

/* ── Forms ── */
.form-section { margin-bottom: 28px; }
.form-section-title {
  font-size: 13px; font-weight: 900; color: var(--purple);
  border-left: 3px solid var(--purple); padding-left: 8px;
  margin-bottom: 14px;
}
.form-grid { display: grid; gap: 14px; }
.form-grid-2 { grid-template-columns: 1fr 1fr; }
.form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 10px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
input[type=text], input[type=password], input[type=number], select, textarea {
  padding: 8px 11px; border: 1px solid var(--border); border-radius: 6px;
  font-family: var(--font); font-size: 13px; color: var(--text); background: var(--white);
}
input:focus, select:focus, textarea:focus { outline: 2px solid var(--purple); border-color: transparent; }
textarea { min-height: 58px; resize: vertical; }

/* ── Score Picker ── */
.score-row { display: flex; align-items: center; gap: 14px; }
.score-picker { display: flex; gap: 5px; }
.score-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--white);
  font-size: 13px; font-weight: 900; cursor: pointer; color: var(--gray);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
}
.score-btn:hover { border-color: var(--purple); color: var(--purple); }
.score-btn.active { background: var(--purple); color: var(--white); border-color: var(--purple); }
.score-label { font-size: 11px; font-weight: 700; color: var(--text); min-width: 130px; }

/* ── Tags ── */
.tag { display: inline-block; background: var(--purple); color: var(--white); border-radius: 10px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
.tag-green { background: #1E8449; }
.tag-orange { background: #D35400; }
.tag-gray { background: #888; }

/* ── Alerts ── */
.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; font-weight: 600; }
.alert-success { background: #D5F5E3; color: #1A5E33; border: 1px solid #A9DFBF; }
.alert-warning { background: #FCF3CF; color: #7D6608; border: 1px solid #F9E79F; }
.alert-info { background: var(--purple-lt); color: var(--purple-dk); border: 1px solid #C8A8E8; }

/* ── Utilities ── */
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-center { display: flex; align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.text-gray { color: var(--gray); }
.text-purple { color: var(--purple); font-weight: 900; }
.font-sm { font-size: 11px; }
.section-title { font-size: 14px; font-weight: 900; color: var(--purple); border-left: 3px solid var(--purple); padding-left: 8px; margin-bottom: 14px; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="brand">
    <div class="brand-mister">MISTER</div>
    <div class="brand-wiz">W<span class="star">✦</span>Z</div>
    <div class="brand-sub">Admin Dashboard</div>
  </div>
  <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
    <span class="nav-icon">▦</span> Dashboard
  </a>
  <a href="{{ url_for('students') }}" class="nav-link {% if 'student' in request.endpoint %}active{% endif %}">
    <span class="nav-icon">◉</span> Alunos
  </a>
  <a href="{{ url_for('upload') }}" class="nav-link {% if request.endpoint == 'upload' %}active{% endif %}">
    <span class="nav-icon">↑</span> Upload CSV
  </a>
  <a href="{{ url_for('reports') }}" class="nav-link {% if request.endpoint in ('reports','preview') %}active{% endif %}">
    <span class="nav-icon">◈</span> Relatórios
  </a>
  <div class="nav-spacer"></div>
  <a href="{{ url_for('logout') }}" class="nav-link nav-logout">
    <span class="nav-icon">⏻</span> Sair
  </a>
</nav>

<div class="main">
  <div class="topbar">
    <div class="page-title">{% block page_title %}{% endblock %}</div>
    <div class="flex gap-8">{% block topbar_actions %}{% endblock %}</div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
